name: Refresh Media Archive

on:
  schedule:
    - cron: "0 13 * * 0"
      timezone: America/Chicago
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-media-archive
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh archive and rebuild site
        run: npm run refresh:archive

      - name: Commit refreshed site
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No staged changes detected."
            exit 0
          fi

          git commit -m "chore: refresh media archive"
          git push origin HEAD:$GITHUB_REF_NAME
